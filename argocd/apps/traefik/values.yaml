service:
  type: LoadBalancer

providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true

ingressRoute:
  dashboard:
    enabled: false

ports:
  web:
    middlewares:
      - traefik-redirect-https@kubernetescrd
  websecure:
    tls:
      enabled: true

logs:
  general:
    level: INFO
  access:
    enabled: true
