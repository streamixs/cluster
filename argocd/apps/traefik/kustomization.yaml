apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

resources:
  - tlsstore-default.yaml
  - wildcard-certificate.yaml
  - middleware-redirect-https.yaml

helmCharts:
  - name: traefik
    namespace: traefik
    releaseName: traefik
    repo: https://traefik.github.io/charts
    valuesFile: values.yaml
    version: 34.5.0
