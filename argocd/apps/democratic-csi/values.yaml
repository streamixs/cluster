csiDriver:
  name: "org.democratic-csi.nfs"

storageClasses:
  - name: truenas-nfs
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: nfs
    mountOptions:
      - noatime
      - nfsvers=4
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

driver:
  config:
    driver: freenas-nfs
    instance_id:
    httpConnection:
      protocol: http
      host: 192.168.1.5
      port: 80
      # API key injected from K8s secret truenas-api-key (managed by KSOPS)
      apiKey:
      allowInsecure: true
    httpConnection.apiKeySecretRef:
      name: truenas-api-key
      key: api-key
    sshConnection:
      host: 192.168.1.5
      port: 22
      username: root
      # Use SSH key or password — SSH is used for dataset operations
      password: ""
      privateKey: ""
    zfs:
      datasetParentName: applications/dev
      detachedSnapshotsDatasetParentName: applications/dev/snapshots
      datasetProperties:
        "org.freenas:description": "{{ parameters.[csi.storage.k8s.io/pvc/namespace] }}/{{ parameters.[csi.storage.k8s.io/pvc/name] }}"
      datasetEnableQuotas: true
      datasetEnableReservation: false
    nfs:
      shareHost: 192.168.1.5
      shareAlldirs: false
      shareAllowedHosts: []
      shareAllowedNetworks: []
      shareMaprootUser: root
      shareMaprootGroup: root
      shareMapallUser: ""
      shareMapallGroup: ""
