loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    max_concurrent: 4
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

deploymentMode: SimpleScalable

backend:
  replicas: 1
  persistence:
    storageClass: truenas-nfs
read:
  replicas: 1
write:
  replicas: 1
  persistence:
    storageClass: truenas-nfs

minio:
  enabled: true
  persistence:
    storageClass: truenas-nfs

gateway:
  service:
    type: ClusterIP
