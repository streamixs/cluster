apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich

resources:
  - namespace.yaml
  - immich-library-pvc.yaml
  - ingressroute.yaml
  - postgres

helmCharts:
  - name: immich
    namespace: immich
    releaseName: immich
    repo: https://immich-app.github.io/immich-charts
    version: 0.11.1
    valuesFile: values.yaml
    includeCRDs: false
