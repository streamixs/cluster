apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: qbittorrent
          image: ghcr.io/hotio/qbittorrent:release-5.1.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          env:
            - name: PUID
              value: "65534"
            - name: PGID
              value: "65534"
            - name: UMASK
              value: "002"
            - name: TZ
              value: "Europe/Paris"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: qbittorrent-pvc
              mountPath: /config
            - name: media-pvc
              mountPath: /media
            - name: download-pvc
              mountPath: /downloads
      volumes:
        - name: qbittorrent-pvc
          persistentVolumeClaim:
            claimName: qbittorrent-pvc
        - name: media-pvc
          persistentVolumeClaim:
            claimName: media-pvc
        - name: download-pvc
          persistentVolumeClaim:
            claimName: download-pvc
