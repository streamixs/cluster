apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: navidrome
          image: deluan/navidrome:0.61.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: 4533
          env:
            - name: TZ
              value: "Europe/Paris"
            - name: ND_LOGLEVEL
              value: "info"
            - name: ND_SCANNER_SCHEDULE
              value: "@every 1h"
            - name: ND_SESSIONTIMEOUT
              value: "24h"
            - name: ND_BASEURL
              value: ""
            - name: ND_ENABLESHARING
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /ping
              port: 4533
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: 4533
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: media
              mountPath: /music
              subPath: music
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
