apiVersion: v1
kind: PersistentVolume
metadata:
  name: download-pv
spec:
  capacity:
    storage: 300Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - noatime
    - nfsvers=4
  nfs:
    server: 192.168.1.5
    path: /mnt/main/dev/downloads
