apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  # Static PVs (NFS direct mount on TrueNAS)
  - media-pv.yaml
  - download-pv.yaml
  # PVCs bound to static PVs
  - media-pvc.yaml
  - download-pvc.yaml
  # PVCs provisioned by democratic-csi (app configs)
  - prowlarr-pvc.yaml
  - radarr-pvc.yaml
  - sonarr-pvc.yaml
  - qbittorrent-pvc.yaml
