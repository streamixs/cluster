apiVersion: apps/v1
kind: Deployment
metadata:
  name: qui
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qui
  template:
    metadata:
      labels:
        app: qui
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        - name: qui
          image: ghcr.io/autobrr/qui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7476
          livenessProbe:
            httpGet:
              path: /
              port: 7476
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 7476
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          env:
            - name: TZ
              value: "Europe/Paris"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /downloads
              subPath: downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qui-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
