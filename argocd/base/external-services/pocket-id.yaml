apiVersion: v1
kind: Service
metadata:
  name: pocket-id
spec:
  type: ClusterIP
  ports:
    - port: 1411
      targetPort: 1411
---
apiVersion: v1
kind: Endpoints
metadata:
  name: pocket-id
subsets:
  - addresses:
      - ip: 192.168.1.4
    ports:
      - port: 1411
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.streamixs.com`)
      kind: Rule
      services:
        - name: pocket-id
          port: 1411
  tls: {}
