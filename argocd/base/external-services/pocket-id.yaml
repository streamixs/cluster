apiVersion: v1
kind: Service
metadata:
  name: pocket-id
spec:
  type: ClusterIP
  ports:
    - port: 1411
      targetPort: 1411
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: pocket-id
  labels:
    kubernetes.io/service-name: pocket-id
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.4
ports:
  - port: 1411
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pocket-id
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.streamixs.com`)
      kind: Rule
      services:
        - name: pocket-id
          port: 1411
  tls: {}
