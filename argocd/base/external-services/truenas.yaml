apiVersion: v1
kind: Service
metadata:
  name: truenas
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: truenas
  labels:
    kubernetes.io/service-name: truenas
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.10
ports:
  - port: 80
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`truenas.streamixs.com`)
      kind: Rule
      middlewares:
        - name: forward-auth
          namespace: auth
      services:
        - name: truenas
          port: 80
  tls: {}
