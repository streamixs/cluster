apiVersion: v1
kind: Service
metadata:
  name: truenas
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas
subsets:
  - addresses:
      - ip: 192.168.1.10
    ports:
      - port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`truenas.streamixs.com`)
      kind: Rule
      middlewares:
        - name: forward-auth
          namespace: auth
      services:
        - name: truenas
          port: 80
  tls: {}
