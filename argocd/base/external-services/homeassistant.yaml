apiVersion: v1
kind: Service
metadata:
  name: homeassistant
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: 8123
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: homeassistant
  labels:
    kubernetes.io/service-name: homeassistant
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.21
ports:
  - port: 8123
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ha.streamixs.com`)
      kind: Rule
      services:
        - name: homeassistant
          port: 8123
  tls: {}
