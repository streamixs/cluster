apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: streamixs-com
  namespace: kube-system
spec:
  secretName: streamixs-com-production-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.streamixs.com"
  dnsNames:
    - "streamixs.com"
    - "*.streamixs.com"
