apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: forward-auth-callback
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`oauth.streamixs.com`) && PathPrefix(`/_oauth`)
      kind: Rule
      middlewares:
        - name: forward-auth
          namespace: auth
      services:
        - name: traefik-forward-auth
          port: 4181
  tls: {}
