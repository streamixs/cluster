---
clusterName: streamixs
talosVersion: v1.12.0
kubernetesVersion: v1.32.0
# VIP ou IP du load balancer devant les control-planes
# A configurer quand le hardware sera pret
endpoint: https://192.168.1.30:6443

allowSchedulingOnControlPlanes: false

cniConfig:
  name: none

nodes:
  # --- Control Planes (3x mini PCs) ---
  - hostname: kube-master-01
    controlPlane: true
    ipAddress: 192.168.1.30 # PLACEHOLDER - adapter a l'IP reelle
    installDisk: /dev/sda # PLACEHOLDER - verifier avec lsblk

  # --- Workers (ajouter quand le hardware arrive) ---
  - hostname: kube-worker-01
    controlPlane: false
    ipAddress: 192.168.1.40
    installDisk: /dev/nvme0n1
  - hostname: kube-worker-02
    controlPlane: false
    ipAddress: 192.168.1.41
    installDisk: /dev/nvme0n1
  - hostname: kube-worker-03
    controlPlane: false
    ipAddress: 192.168.1.42
    installDisk: /dev/nvme0n1

controlPlane:
  patches:
    - |-
      cluster:
        proxy:
          disabled: true
      machine:
        network:
          nameservers:
            - 1.1.1.1
            - 8.8.8.8
        kernel:
          modules:
            - name: nfs
            - name: nfsd
        time:
          servers:
            - time.cloudflare.com

worker:
  patches:
    - |-
      machine:
        network:
          nameservers:
            - 1.1.1.1
            - 8.8.8.8
        kernel:
          modules:
            - name: nfs
            - name: nfsd
        time:
          servers:
            - time.cloudflare.com
