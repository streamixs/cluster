---
clusterName: streamixs
talosVersion: v1.12.6
kubernetesVersion: v1.35.3

endpoint: https://192.168.1.30:6443
allowSchedulingOnControlPlanes: false

cniConfig:
  name: none

nodes:
  - hostname: kube-master-01
    controlPlane: true
    ipAddress: 192.168.1.30
    installDisk: /dev/sda
    talosImageURL: factory.talos.dev/installer/ce4c980550dd2ab1b17bbf2b08801c7eb59418eafe8f279833297925d67c7515

  - hostname: kube-worker-01
    controlPlane: false
    ipAddress: 192.168.1.40
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/4ea1b20f73a7b3eac7faac4a02193470a85d0e2c441af474ddfd2de2e8da4dc7

  - hostname: kube-worker-02
    controlPlane: false
    ipAddress: 192.168.1.41
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/4ea1b20f73a7b3eac7faac4a02193470a85d0e2c441af474ddfd2de2e8da4dc7

  - hostname: kube-worker-03
    controlPlane: false
    ipAddress: 192.168.1.42
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/4ea1b20f73a7b3eac7faac4a02193470a85d0e2c441af474ddfd2de2e8da4dc7

controlPlane:
  patches:
    - |-
      cluster:
        proxy:
          disabled: true
      machine:
        network:
          nameservers:
            - 192.168.1.3
            - 1.1.1.1
        time:
          servers:
            - time.cloudflare.com

worker:
  patches:
    - |-
      machine:
        network:
          nameservers:
            - 192.168.1.3
            - 1.1.1.1
        time:
          servers:
            - time.cloudflare.com
    - |-
      machine:
        sysctls:
          vm.nr_hugepages: "1024"
        kubelet:
          extraMounts:
            - destination: /var/lib/longhorn
              type: bind
              source: /var/lib/longhorn
              options:
                - bind
                - rshared
                - rw
