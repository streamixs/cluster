configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: <S3_BUCKET_NAME>
      prefix: velero
      config:
        region: <S3_REGION>
        s3Url: <S3_ENDPOINT_URL>
        s3ForcePathStyle: "true"
  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: <S3_REGION>

credentials:
  useSecret: true
  secretContents:
    cloud: |
      [default]
      aws_access_key_id = <S3_ACCESS_KEY_ID>
      aws_secret_access_key = <S3_SECRET_ACCESS_KEY>

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.8.2
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

snapshotsEnabled: false
deployNodeAgent: true

schedules:
  daily-media-pvcs:
    schedule: "0 3 * * *"
    template:
      ttl: 120h
      includedNamespaces:
        - media
      storageLocation: default
      snapshotVolumes: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

