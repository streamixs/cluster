image:
  repository: lscr.io/linuxserver/radarr
  tag: 5.6.0

service:
  main:
    ports:
      http:
        port: 7878

ingress:
  main:
    hosts:
      - host: radarr.streamixs.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - secretName: radarr-tls
        hosts: [radarr.streamixs.com]

persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 5Gi
    mountPath: /config
  downloads:
    enabled: true
    type: pvc
    storageClass: nas-rwx
    size: 200Gi
    accessMode: ReadWriteMany
    mountPath: /downloads
  media:
    enabled: true
    type: pvc
    storageClass: nas-rwx
    size: 1Ti
    accessMode: ReadWriteMany
    mountPath: /media

controllers:
  main:
    containers:
      main:
        env:
          PUID: <PUID>
          PGID: <PGID>
          TZ: Europe/Paris
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 7878
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 7878
              initialDelaySeconds: 15

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      interval: 30s
