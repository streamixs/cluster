image:
  repository: lscr.io/linuxserver/tautulli
  tag: 2.14.2

service:
  main:
    ports:
      http:
        port: 8181

ingress:
  main:
    hosts:
      - host: tautulli.streamixs.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - secretName: tautulli-tls
        hosts: [tautulli.streamixs.com]

persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 2Gi
    mountPath: /config

controllers:
  main:
    containers:
      main:
        env:
          PUID: <PUID>
          PGID: <PGID>
          TZ: Europe/Paris
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8181
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8181
              initialDelaySeconds: 15

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      interval: 30s
