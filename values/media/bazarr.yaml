image:
  repository: lscr.io/linuxserver/bazarr
  tag: 1.4.3

service:
  main:
    ports:
      http:
        port: 6767

ingress:
  main:
    hosts:
      - host: bazarr.streamixs.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - secretName: bazarr-tls
        hosts: [bazarr.streamixs.com]

persistence:
persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 2Gi
    mountPath: /config
  media:
    enabled: true
    type: pvc
    storageClass: nas-rwx
    accessMode: ReadWriteMany
    size: 1Ti
    mountPath: /media

controllers:
  main:
    containers:
      main:
        env:
          PUID: <PUID>
          PGID: <PGID>
          TZ: Europe/Paris
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 6767
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 6767
              initialDelaySeconds: 15

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      interval: 30s
