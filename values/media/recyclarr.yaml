image:
  repository: recyclarr/recyclarr
  tag: 6.0.2

service:
  main:
    enabled: false

ingress:
  main:
    enabled: false

persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /config

controllers:
  main:
    containers:
      main:
        args:
          - "sync"
        env:
          TZ: Europe/Paris
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
    pod:
      restartPolicy: OnFailure
      annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-weight: "5"
