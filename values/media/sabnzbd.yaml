image:
  repository: lscr.io/linuxserver/sabnzbd
  tag: 4.3.3

service:
  main:
    ports:
      http:
        port: 8080

ingress:
  main:
    hosts:
      - host: sabnzbd.streamixs.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - secretName: sabnzbd-tls
        hosts: [sabnzbd.streamixs.com]

persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 2Gi
    mountPath: /config
  downloads:
    enabled: true
    type: pvc
    storageClass: nas-rwx
    size: 500Gi
    accessMode: ReadWriteMany
    mountPath: /downloads

controllers:
  main:
    containers:
      main:
        env:
          PUID: <PUID>
          PGID: <PGID>
          TZ: Europe/Paris
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 8080
              initialDelaySeconds: 15

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      interval: 30s
