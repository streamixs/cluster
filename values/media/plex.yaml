image:
  repository: lscr.io/linuxserver/plex
  tag: 1.40.5

service:
  main:
    ports:
      http:
        port: 32400

ingress:
  main:
    hosts:
      - host: plex.streamixs.com
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - secretName: plex-tls
        hosts: [plex.streamixs.com]

persistence:
  config:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 20Gi
    mountPath: /config
  transcode:
    enabled: true
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteOnce
    size: 20Gi
    mountPath: /transcode
  media:
    enabled: true
    type: pvc
    storageClass: <STORAGE_CLASS>
    accessMode: ReadWriteMany
    size: 2Ti
    mountPath: /media

controllers:
  main:
    containers:
      main:
        env:
          PUID: <PUID>
          PGID: <PGID>
          TZ: Europe/Paris
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 32400
              initialDelaySeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 32400
              initialDelaySeconds: 15

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      interval: 30s
