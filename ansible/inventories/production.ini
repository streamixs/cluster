[workers]
worker-01 ansible_host=127.0.0.1 ansible_port=54438 ansible_user=code-ex ansible_ssh_private_key_file=~/.lima/_config/user
worker-02 ansible_host=127.0.0.1 ansible_port=54476 ansible_user=code-ex ansible_ssh_private_key_file=~/.lima/_config/user

