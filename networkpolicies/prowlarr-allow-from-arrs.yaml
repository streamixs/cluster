apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prowlarr-allow-from-arrs
  namespace: media
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prowlarr
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["sonarr", "radarr", "lidarr", "readarr"]
      ports:
        - protocol: TCP
          port: 9696
